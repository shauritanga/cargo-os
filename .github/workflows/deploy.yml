name: Build & Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies & build assets
        run: |
          npm ci
          npm run build

      # ── Deploy Laravel app (everything except public/) ──────────────────
      - name: Deploy app files to server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /domains/rtexpress.co.tz/rtexpress/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/public/**
            **/.env
            **/vendor/**

      # ── Deploy public/ → public_html/portal/ ────────────────────────────
      - name: Deploy public folder to portal
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: /domains/rtexpress.co.tz/public_html/portal/
